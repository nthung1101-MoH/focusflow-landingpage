<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - Làm Chủ Thời Gian, Đập Tan Trì Hoãn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Bạn có đang lãng phí 4 tiếng mỗi ngày vì mất tập trung?</h1>
            <p>FocusFlow ứng dụng phương pháp tâm lý học Pomodoro giúp bạn nhân đôi hiệu suất làm việc chỉ sau 7 ngày.</p>
            <a href="#register" class="cta-btn">Tải App Miễn Phí Ngay</a>
        </div>
    </section>

    <section id="register" class="fomo-section">
        <h2>Ưu đãi bản Beta giới hạn sẽ kết thúc sau:</h2>
        
        <div class="countdown-timer">
            <span id="timer">00:15:00</span>
        </div>

        <form id="lead-form">
            <input type="text" id="username" placeholder="Nhập tên của bạn" required>
            <input type="email" id="email" placeholder="Nhập Email để nhận link tải" required>
            <button type="submit" class="submit-btn">Nhận Ưu Đãi</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
